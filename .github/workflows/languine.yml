name: Languine Translation

on:
  push:
    branches: [main]
    paths:
      - 'packages/common/src/locale/**/*.json'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Languine Translation
        uses: languine-ai/languine@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LANGUINE_BASE_URL: ${{ secrets.LANGUINE_BASE_URL }}
        with:
          api-key: ${{ secrets.LANGUINE_API_KEY }}
          project-id: ${{ secrets.LANGUINE_PROJECT_ID }}